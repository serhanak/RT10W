<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RT10W</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 16px; left: 16px;
      color: #fff; font-family: 'Segoe UI', monospace; font-size: 14px;
      pointer-events: none; z-index: 10;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      line-height: 1.6;
    }
    #hud .vehicle-hud { display: none; }
    #hud.driving .player-hud { display: none; }
    #hud.driving .vehicle-hud { display: block; }
    #prompt {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: 'Segoe UI', sans-serif; font-size: 16px;
      background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 8px;
      pointer-events: none; z-index: 10; display: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="player-hud">
      <div>RT10W — Player Mode</div>
      <div>WASD: Move | Space: Jump | Shift: Sprint</div>
      <div>Mouse: Look | C: Camera Mode</div>
    </div>
    <div class="vehicle-hud">
      <div>RT10W — Vehicle Mode</div>
      <div>W/S: Throttle/Brake | A/D: Steer | Space: Handbrake</div>
      <div>C: Camera | Mouse: Look</div>
      <div id="telemetry"></div>
    </div>
  </div>
  <div id="prompt">Press E to enter vehicle</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
